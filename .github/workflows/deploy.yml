name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ramji55/easyshop-frontend:${{ github.sha }} .
          docker tag ramji55/easyshop-frontend:${{ github.sha }} ramji55/easyshop-frontend:latest

      - name: Push Docker Images
        run: |
          docker push ramji55/easyshop-frontend:${{ github.sha }}
          docker push ramji55/easyshop-frontend:latest

      - name: Create Namespace (if it doesn't exist)
        run: |
          kubectl create namespace easyshop --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/

      - name: Update Frontend Image
        run: |
          kubectl set image deployment/frontend \
          frontend=ramji55/easyshop-frontend:${{ github.sha }} \
          -n easyshop

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/frontend -n easyshop